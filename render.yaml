# Blueprint de Render: https://render.com/docs/blueprint-spec
# Conecta el repo en Dashboard → New → Blueprint → elige esta rama (main).
# Tras el primer deploy, completa en el servicio web las variables con sync: false.

databases:
  - name: votio-db
    databaseName: votio

services:
  # Redis compatible (Bull). Ajusta ipAllowList en producción si Render lo exige.
  - type: keyvalue
    name: votio-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: render-services

  - type: web
    name: votio-api
    runtime: node
    region: frankfurt
    plan: free
    branch: main
    buildCommand: npm install && npm run prisma:generate --workspace=apps/backend && npm run backend:build
    startCommand: cd apps/backend && npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/v1/analysis/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api/v1
      # Orígenes permitidos CORS (coma-separados). Añade dominios web si los usas.
      - key: CORS_ORIGINS
        value: https://votio-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: votio-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: votio-redis
          type: keyvalue
          property: connectionString
      - key: STORAGE_PROVIDER
        value: local
      # Secretos: Render pedirá valores al crear el Blueprint (o configúralos a mano).
      - key: GEMINI_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
